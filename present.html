<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Presenter · Pharma Pulse</title>
<link rel="stylesheet" href="/style.css" />
<style>
  body { background: #fff; }
  .stage { min-height: 100vh; display: flex; flex-direction: column; }
  .stage-head {
    background: linear-gradient(100deg, var(--blue), var(--teal));
    color: #fff; padding: 22px 40px; display: flex; justify-content: space-between; align-items: center;
  }
  .stage-head .ttl { font-size: 15px; opacity: .9; }
  .stage-head .live { font-size: 13px; font-weight: 700; padding: 5px 12px; border-radius: 20px; background: rgba(255,255,255,.2); }
  .stage-body { flex: 1; display: flex; flex-direction: column; padding: 32px 48px; }
  .qtext { font-size: clamp(26px, 4vw, 46px); font-weight: 700; color: var(--ink); margin-bottom: 6px; }
  .count { color: var(--muted); font-size: 18px; margin-bottom: 24px; }
  .canvas { flex: 1; position: relative; }

  /* multiple choice bars */
  .bar-row { margin-bottom: 22px; }
  .bar-top { display: flex; justify-content: space-between; font-size: clamp(16px,1.8vw,24px); font-weight: 600; margin-bottom: 6px; }
  .bar-track { height: clamp(28px,4vh,46px); background: #eef3f8; border-radius: 10px; overflow: hidden; }
  .bar-fill { height: 100%; width: 0; border-radius: 10px; background: linear-gradient(90deg, var(--blue), var(--teal)); transition: width .6s cubic-bezier(.2,.8,.2,1); }

  /* word bubbles */
  .bubbles { position: absolute; inset: 0; overflow: hidden; }
  .bubble {
    position: absolute; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    text-align: center; color: #fff; font-weight: 700; padding: 10px; box-shadow: var(--shadow);
    transition: all .8s cubic-bezier(.2,.8,.2,1); animation: pop .5s ease;
  }
  @keyframes pop { from { transform: scale(.2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes floaty { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-10px);} }

  /* text feed */
  .feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 16px; align-content: start; }
  .feed-card { background: var(--panel); border:1px solid var(--line); border-left: 4px solid var(--teal); border-radius: 12px; padding: 16px 18px; box-shadow: var(--shadow); animation: pop .4s ease; }
  .feed-card .who { font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
  .feed-card .what { font-size: clamp(16px,1.6vw,22px); }

  /* rating */
  .rating-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; }
  .avg { font-size: clamp(60px,12vw,140px); font-weight: 800; background: linear-gradient(90deg,var(--blue),var(--teal)); -webkit-background-clip: text; background-clip: text; color: transparent; line-height: 1; }
  .avg-sub { color: var(--muted); font-size: 20px; margin-bottom: 30px; }
  .dist { display:flex; gap: 14px; align-items: flex-end; height: 30vh; }
  .dist-col { display:flex; flex-direction:column; align-items:center; justify-content:flex-end; }
  .dist-bar { width: clamp(36px,5vw,64px); background: linear-gradient(180deg,var(--teal),var(--blue)); border-radius: 8px 8px 0 0; transition: height .6s; min-height: 4px; }
  .dist-num { margin-top: 8px; font-weight: 700; color: var(--muted); }

  .idle { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color: var(--muted); text-align:center; }
  .idle .big { font-size: 30px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
  .qr { margin-top: 24px; }
</style>
</head>
<body>
<div class="stage">
  <div class="stage-head">
    <div><div class="ttl" id="ttl">Operations Pharmacy</div><div style="font-size:13px;opacity:.75">Pharma Pulse · live</div></div>
    <div class="live" id="liveBadge">Waiting…</div>
  </div>
  <div class="stage-body">
    <div id="active" class="hide">
      <div class="qtext" id="qtext"></div>
      <div class="count" id="count"></div>
    </div>
    <div class="canvas" id="canvas">
      <div class="idle" id="idle">
        <div class="big">Ready when you are</div>
        <div>The presenter will launch a question from the admin dashboard.</div>
        <div class="qr"><img id="idleQr" alt="Scan to join" style="border-radius:12px"/></div>
        <div style="margin-top:10px">Scan to join, or open <b id="formUrl"></b></div>
      </div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const PALETTE = ['#1a6dc4','#16a394','#6b4cc0','#c08a2c','#d4584b','#1b8a8f','#3a7bd5','#2aa17a'];
let current = null;

const formUrl = location.origin + '/form';
$('#formUrl').textContent = formUrl;
$('#idleQr').src = 'https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=' + encodeURIComponent(formUrl);

async function load(){
  const d = await fetch('/api/present').then(r=>r.json());
  $('#ttl').textContent = d.title;
  if (!d.question){ showIdle(); return; }
  $('#idle').classList.add('hide');
  $('#active').classList.remove('hide');
  $('#liveBadge').textContent = d.accepting ? '● LIVE — answers open' : '● LIVE — paused';
  $('#qtext').textContent = d.question.text;
  const newQ = !current || current.id !== d.question.id;
  current = d.question;
  render(d.question, d.results, newQ);
}

function showIdle(){
  current = null;
  $('#active').classList.add('hide');
  $('#idle').classList.remove('hide');
  $('#liveBadge').textContent = 'Waiting…';
  $('#canvas').querySelectorAll('.dynamic').forEach(e=>e.remove());
}

function setCount(n){ $('#count').textContent = n + (n===1?' response':' responses'); }

function render(q, res, fresh){
  setCount(res.total || 0);
  const canvas = $('#canvas');
  if (fresh) canvas.querySelectorAll('.dynamic').forEach(e=>e.remove());

  if (q.type === 'mc') renderMC(canvas, q, res, fresh);
  else if (q.type === 'words') renderWords(canvas, res, fresh);
  else if (q.type === 'text') renderText(canvas, res, fresh);
  else if (q.type === 'rating') renderRating(canvas, res, fresh);
}

function ensure(canvas, cls, tag='div'){
  let el = canvas.querySelector('.'+cls);
  if (!el){ el = document.createElement(tag); el.className = cls + ' dynamic'; canvas.appendChild(el); }
  return el;
}

function renderMC(canvas, q, res, fresh){
  const box = ensure(canvas, 'mc-box');
  const total = res.total || 0;
  const max = Math.max(1, ...res.options.map(o=>o.count));
  box.innerHTML = res.options.map((o,i)=>{
    const pct = total ? Math.round(o.count/total*100) : 0;
    const w = (o.count/max*100);
    return `<div class="bar-row">
      <div class="bar-top"><span>${esc(o.text)}</span><span>${pct}% · ${o.count}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:linear-gradient(90deg,${PALETTE[i%PALETTE.length]},${PALETTE[(i+1)%PALETTE.length]})"></div></div>
    </div>`;
  }).join('');
}

function renderWords(canvas, res, fresh){
  const layer = ensure(canvas, 'bubbles');
  const words = res.words || [];
  const max = Math.max(1, ...words.map(w=>w.count));
  const W = layer.clientWidth || canvas.clientWidth;
  const H = layer.clientHeight || canvas.clientHeight || 500;
  // simple non-overlapping-ish placement
  const placed = [];
  const top = words.slice(0, 40);
  layer.innerHTML = '';
  top.forEach((w,i)=>{
    const size = 60 + (w.count/max) * Math.min(W,H) * 0.28;
    let x,y,tries=0,ok=false;
    while(tries++ < 60){
      x = Math.random()*(W-size); y = Math.random()*(H-size);
      ok = placed.every(p => Math.hypot((x+size/2)-(p.x+p.s/2),(y+size/2)-(p.y+p.s/2)) > (size+p.s)/2*0.92);
      if (ok) break;
    }
    placed.push({x,y,s:size});
    const b = document.createElement('div');
    b.className = 'bubble';
    const fs = Math.max(13, size*0.22);
    b.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;font-size:${fs}px;background:linear-gradient(135deg,${PALETTE[i%PALETTE.length]},${PALETTE[(i+3)%PALETTE.length]});animation:pop .5s ease, floaty ${3+Math.random()*2}s ease-in-out ${Math.random()}s infinite;`;
    b.innerHTML = `<div>${esc(w.text)}${w.count>1?`<div style="font-size:.7em;opacity:.85">×${w.count}</div>`:''}</div>`;
    layer.appendChild(b);
  });
  if (!top.length) layer.innerHTML = '<div class="idle" style="position:absolute;inset:0"><div>Waiting for the first answer…</div></div>';
}

function renderText(canvas, res, fresh){
  const feed = ensure(canvas, 'feed');
  const entries = res.entries || [];
  feed.innerHTML = entries.map(e=>`<div class="feed-card"><div class="who">${esc(e.name)}</div><div class="what">${esc(e.value)}</div></div>`).join('')
    || '<div class="muted">Waiting for the first answer…</div>';
}

function renderRating(canvas, res, fresh){
  const wrap = ensure(canvas, 'rating-wrap');
  const max = res.max || 5;
  const dist = res.distribution || {};
  const maxCount = Math.max(1, ...Object.values(dist));
  let cols = '';
  for (let i=1;i<=max;i++){
    const h = (dist[i]||0)/maxCount*100;
    cols += `<div class="dist-col"><div class="muted" style="font-size:14px">${dist[i]||0}</div><div class="dist-bar" style="height:${h}%"></div><div class="dist-num">${i}</div></div>`;
  }
  wrap.innerHTML = `<div class="avg">${res.average||0}</div><div class="avg-sub">average of ${res.total||0} rating${res.total===1?'':'s'} (out of ${max})</div><div class="dist">${cols}</div>`;
}

const socket = io();
socket.on('results-changed', load);
socket.on('state-changed', load);
window.addEventListener('resize', ()=>{ if(current) load(); });
load();
setInterval(load, 8000); // safety refresh
</script>
</body>
</html>

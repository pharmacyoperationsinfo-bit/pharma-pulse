<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Presenter · Pharma Pulse</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg" />
<link rel="stylesheet" href="/style.css" />
<style>
  :root { --stage-bg:#f4f7fa; --stage-ink:#1f2d3d; --stage-muted:#6b7c93; --card:#ffffff; --line:#e3e9f0; }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body { margin:0; overflow:hidden; background:var(--stage-bg); color:var(--stage-ink);
    transition:background .6s ease, color .6s ease; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }

  /* ---------- BOLD THEME ---------- */
  body.bold { --stage-ink:#ffffff; --stage-muted:#b9c6e6; --card:rgba(255,255,255,.08); --line:rgba(255,255,255,.18); color:#fff; }
  body.bold::before {
    content:""; position:fixed; inset:0; z-index:-2;
    background:linear-gradient(125deg,#0b1437,#16306b,#0e7d72,#5b2a8c,#0b1437);
    background-size:400% 400%; animation:gradientMove 18s ease infinite;
  }
  body.bold::after {
    content:""; position:fixed; inset:0; z-index:-1; opacity:.5;
    background:radial-gradient(circle at 20% 30%, rgba(94,234,212,.25), transparent 40%),
               radial-gradient(circle at 80% 70%, rgba(129,140,248,.25), transparent 40%);
  }
  @keyframes gradientMove { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

  /* ---------- LAYOUT ---------- */
  .stage { height:100vh; display:flex; flex-direction:column; }
  .stage-head { display:flex; justify-content:space-between; align-items:center; padding:18px 36px; }
  body:not(.bold) .stage-head { background:linear-gradient(100deg,var(--blue),var(--teal)); color:#fff; box-shadow:var(--shadow); }
  body.bold .stage-head { background:rgba(255,255,255,.06); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); }
  .head-left .ttl { font-size:17px; font-weight:700; }
  .head-left .sub { font-size:12px; opacity:.8; }
  .head-right { display:flex; align-items:center; gap:10px; }
  .live-badge { font-size:13px; font-weight:800; padding:6px 14px; border-radius:30px; display:flex; align-items:center; gap:8px;
    background:rgba(255,255,255,.18); }
  body.bold .live-badge { background:rgba(255,255,255,.14); }
  .dot { width:9px; height:9px; border-radius:50%; background:#54f0c8; box-shadow:0 0 0 0 rgba(84,240,200,.7); animation:pulse 1.6s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(84,240,200,.6)} 70%{box-shadow:0 0 0 12px rgba(84,240,200,0)} 100%{box-shadow:0 0 0 0 rgba(84,240,200,0)} }
  .ctrl { width:42px; height:42px; border-radius:12px; border:none; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.2); color:#fff; transition:transform .15s, background .15s; }
  .ctrl:hover { transform:translateY(-2px); background:rgba(255,255,255,.34); }

  .stage-body { flex:1; display:flex; flex-direction:column; padding:30px 52px 24px; position:relative; min-height:0; }
  .qhead { display:flex; align-items:flex-start; gap:18px; margin-bottom:14px; }
  .qtext { font-size:clamp(16px,1.9vw,26px); font-weight:700; line-height:1.25; flex:1; max-height:32vh; overflow-y:auto; padding-right:8px; }
  .qtext::-webkit-scrollbar { width:8px; } .qtext::-webkit-scrollbar-thumb { background:rgba(120,140,170,.4); border-radius:6px; }
  .count-chip { flex:0 0 auto; text-align:center; padding:10px 18px; border-radius:16px; background:var(--card); border:1px solid var(--line);
    box-shadow:var(--shadow); }
  .count-chip .n { font-size:clamp(26px,3vw,42px); font-weight:900; line-height:1;
    background:linear-gradient(90deg,var(--blue),var(--teal)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  body.bold .count-chip .n { background:linear-gradient(90deg,#5eead4,#a5b4fc); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .count-chip .l { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--stage-muted); font-weight:700; }
  .canvas { flex:1; position:relative; min-height:0; }

  /* ---------- MULTIPLE CHOICE ---------- */
  .mc-box { display:flex; flex-direction:column; justify-content:center; height:100%; gap:18px; }
  .bar-row { animation:slideIn .5s cubic-bezier(.2,.8,.2,1); }
  @keyframes slideIn { from{opacity:0; transform:translateX(-24px)} to{opacity:1; transform:translateX(0)} }
  .bar-top { display:flex; justify-content:space-between; align-items:center; font-size:clamp(16px,1.9vw,26px); font-weight:700; margin-bottom:7px; }
  .bar-top .pct { font-variant-numeric:tabular-nums; }
  .bar-track { height:clamp(30px,5vh,52px); background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden; }
  .bar-fill { height:100%; width:0; border-radius:14px; transition:width .8s cubic-bezier(.2,.8,.2,1); position:relative; }
  .bar-fill::after { content:""; position:absolute; inset:0; background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
    transform:translateX(-100%); animation:shimmer 2.4s infinite; }
  @keyframes shimmer { 100%{transform:translateX(100%)} }
  .bar-row.winner .bar-top .label::before { content:"👑 "; }
  .bar-row.winner .bar-track { box-shadow:0 0 0 3px rgba(245,196,90,.55), 0 8px 24px rgba(245,196,90,.25); }

  /* ---------- WORD BUBBLES ---------- */
  .bubbles { position:absolute; inset:0; overflow:hidden; }
  .bubble { position:absolute; border-radius:50%; display:flex; align-items:center; justify-content:center; text-align:center; color:#fff; font-weight:800;
    padding:8px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,.18); animation:pop .55s cubic-bezier(.2,1.4,.4,1); }
  .bubble .bw { width:100%; line-height:1.08; word-break:break-word; overflow-wrap:anywhere; hyphens:auto; }
  @keyframes pop { from{transform:scale(.2); opacity:0} to{transform:scale(1); opacity:1} }
  @keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

  /* ---------- TEXT FEED ---------- */
  .feed { display:grid; grid-template-columns:repeat(auto-fill,minmax(310px,1fr)); gap:18px; align-content:start; overflow-y:auto; height:100%; padding-right:6px; scroll-behavior:smooth; }
  .feed::-webkit-scrollbar { width:10px; } .feed::-webkit-scrollbar-thumb { background:rgba(120,140,170,.45); border-radius:6px; }
  .feed-card { background:var(--card); border:1px solid var(--line); border-left:5px solid var(--teal); border-radius:14px; padding:16px 20px;
    box-shadow:var(--shadow); animation:cardIn .5s cubic-bezier(.2,1.2,.4,1); backdrop-filter:blur(8px); }
  @keyframes cardIn { from{opacity:0; transform:translateY(20px) scale(.96)} to{opacity:1; transform:translateY(0) scale(1)} }
  .feed-card .who { font-size:13px; color:var(--stage-muted); font-weight:700; margin-bottom:5px; }
  .feed-card .what { font-size:clamp(16px,1.7vw,24px); font-weight:500; }

  /* ---------- RATING ---------- */
  .rating-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; }
  .avg { font-size:clamp(64px,13vw,150px); font-weight:900; line-height:1;
    background:linear-gradient(90deg,var(--blue),var(--teal)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  body.bold .avg { background:linear-gradient(90deg,#5eead4,#a5b4fc); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .stars { font-size:clamp(28px,4vw,52px); letter-spacing:6px; margin:6px 0; }
  .avg-sub { color:var(--stage-muted); font-size:clamp(15px,1.6vw,20px); margin-bottom:26px; font-weight:600; }
  .dist { display:flex; gap:16px; align-items:flex-end; height:30vh; }
  .dist-col { display:flex; flex-direction:column; align-items:center; justify-content:flex-end; }
  .dist-bar { width:clamp(36px,5vw,66px); border-radius:10px 10px 0 0; transition:height .7s cubic-bezier(.2,.8,.2,1); min-height:5px;
    background:linear-gradient(180deg,var(--teal),var(--blue)); }
  body.bold .dist-bar { background:linear-gradient(180deg,#5eead4,#818cf8); }
  .dist-num { margin-top:9px; font-weight:800; color:var(--stage-muted); font-size:clamp(14px,1.4vw,20px); }

  /* ---------- IDLE ---------- */
  .idle { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:8px; }
  .idle .big { font-size:clamp(28px,3.5vw,44px); font-weight:800; }
  .idle .small { color:var(--stage-muted); font-size:clamp(15px,1.6vw,20px); }
  .idle .qr-big { margin-top:22px; background:#fff; padding:16px; border-radius:18px; box-shadow:0 16px 40px rgba(0,0,0,.18); }
  .idle .qr-big img { display:block; width:200px; height:200px; }
  .idle .join-url { margin-top:14px; font-size:clamp(18px,2vw,26px); font-weight:800; }
  .idle .join-url b { background:linear-gradient(90deg,var(--blue),var(--teal)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  body.bold .idle .join-url b { color:#5eead4; -webkit-text-fill-color:#5eead4; }

  /* ---------- PERSISTENT JOIN STRIP ---------- */
  .join-strip { display:flex; align-items:center; gap:14px; padding:10px 14px; border-radius:16px; background:var(--card); border:1px solid var(--line);
    box-shadow:var(--shadow); backdrop-filter:blur(8px); margin-top:14px; align-self:flex-start; }
  .join-strip img { width:62px; height:62px; border-radius:8px; background:#fff; }
  .join-strip .jt { font-size:13px; color:var(--stage-muted); font-weight:700; }
  .join-strip .ju { font-size:clamp(15px,1.5vw,20px); font-weight:800; }
  .join-strip.hide { display:none; }

  /* ---------- OVERLAYS ---------- */
  #confetti { position:fixed; inset:0; pointer-events:none; z-index:40; }
  #emojiLayer { position:fixed; inset:0; pointer-events:none; z-index:41; overflow:hidden; }
  .float-emoji { position:absolute; bottom:-60px; font-size:46px; animation:floatUp 4s ease-out forwards; }
  @keyframes floatUp {
    0%{ transform:translateY(0) scale(.6); opacity:0; }
    15%{ opacity:1; transform:translateY(-40px) scale(1.1); }
    100%{ transform:translateY(-78vh) scale(1); opacity:0; }
  }
  .hide { display:none !important; }
</style>
</head>
<body class="">
<canvas id="confetti"></canvas>
<div id="emojiLayer"></div>

<div class="stage">
  <div class="stage-head">
    <div class="head-left" style="display:flex; align-items:center; gap:14px;">
      <img src="/logo.svg" alt="Pharma Pulse" style="width:46px; height:46px; border-radius:12px; box-shadow:0 4px 14px rgba(0,0,0,.18);" />
      <div>
        <div class="ttl" id="ttl">Operations Pharmacy</div>
        <div class="sub">Pharma Pulse · live training</div>
      </div>
    </div>
    <div class="head-right">
      <div class="live-badge"><span class="dot"></span><span id="liveText">Waiting…</span></div>
      <button class="ctrl" id="themeBtn" title="Toggle theme (T)" onclick="toggleTheme()">🎨</button>
      <button class="ctrl" id="fsBtn" title="Fullscreen (F)" onclick="toggleFs()">⛶</button>
    </div>
  </div>

  <div class="stage-body">
    <div id="active" class="hide">
      <div class="qhead">
        <div class="qtext" id="qtext"></div>
        <div class="count-chip"><div class="n" id="count">0</div><div class="l">responses</div></div>
      </div>
    </div>

    <div class="canvas" id="canvas">
      <div class="idle" id="idle">
        <div class="big">Ready when you are 🎯</div>
        <div class="small">Launch a question from the admin dashboard.</div>
        <div class="qr-big"><img id="idleQr" alt="Scan to join" /></div>
        <div class="join-url">Join at <b id="idleUrl"></b></div>
      </div>
    </div>

    <div class="join-strip hide" id="joinStrip">
      <img id="stripQr" alt="Join QR" />
      <div><div class="jt">📱 Scan to join &amp; react</div><div class="ju" id="stripUrl"></div></div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const PALETTE = ['#1a6dc4','#16a394','#6b4cc0','#c08a2c','#d4584b','#1b8a8f','#3a7bd5','#2aa17a'];
const BOLD_PALETTE = ['#5eead4','#818cf8','#f0abfc','#fcd34d','#fb7185','#67e8f9','#a78bfa','#34d399'];
let current = null, prevTotal = 0, displayCount = 0;

/* ----- theme ----- */
function applyTheme(t){ document.body.classList.toggle('bold', t==='bold'); $('#themeBtn').textContent = t==='bold' ? '☀️' : '🎨'; }
function toggleTheme(){ const t = document.body.classList.contains('bold') ? 'pro' : 'bold'; localStorage.setItem('pp_theme', t); applyTheme(t); if(current) load(); }
applyTheme(localStorage.getItem('pp_theme') || 'pro');

/* ----- fullscreen ----- */
function toggleFs(){ if(!document.fullscreenElement){ document.documentElement.requestFullscreen?.(); } else { document.exitFullscreen?.(); } }
document.addEventListener('keydown', e => {
  if(e.key==='t'||e.key==='T') toggleTheme();
  if(e.key==='f'||e.key==='F') toggleFs();
});

/* ----- join links / QR ----- */
const formUrl = location.origin + '/form';
const prettyUrl = (location.host + '/form');
const qrSrc = sz => 'https://api.qrserver.com/v1/create-qr-code/?size='+sz+'x'+sz+'&margin=0&data=' + encodeURIComponent(formUrl);
$('#idleQr').src = qrSrc(200); $('#stripQr').src = qrSrc(120);
$('#idleUrl').textContent = prettyUrl; $('#stripUrl').textContent = prettyUrl;

function pal(i){ return (document.body.classList.contains('bold') ? BOLD_PALETTE : PALETTE)[i % 8]; }

async function load(){
  let d;
  try { d = await fetch('/api/present').then(r=>r.json()); } catch(e){ return; }
  $('#ttl').textContent = d.title;
  if(!d.question){ showIdle(); return; }
  $('#idle').classList.add('hide');
  $('#active').classList.remove('hide');
  $('#joinStrip').classList.remove('hide');
  $('#liveText').textContent = d.accepting ? 'LIVE · answers open' : 'LIVE · paused';
  $('#qtext').textContent = d.question.text;
  const fresh = !current || current.id !== d.question.id;
  current = d.question;
  if(fresh){ prevTotal = 0; displayCount = 0; }
  render(d.question, d.results, fresh);
}

function showIdle(){
  current = null;
  $('#active').classList.add('hide');
  $('#joinStrip').classList.add('hide');
  $('#idle').classList.remove('hide');
  $('#liveText').textContent = 'Waiting…';
  $('#canvas').querySelectorAll('.dynamic').forEach(e=>e.remove());
}

/* ----- animated counter ----- */
function animateCount(to){
  const el = $('#count'); const from = displayCount; const start = performance.now(); const dur = 600;
  function step(now){ const p = Math.min(1,(now-start)/dur); const v = Math.round(from+(to-from)*p); el.textContent = v;
    if(p<1) requestAnimationFrame(step); else displayCount = to; }
  requestAnimationFrame(step);
}

function render(q, res, fresh){
  const total = res.total || 0;
  animateCount(total);
  if(total > prevTotal && !fresh) burstConfetti(8 + (total-prevTotal)*4);
  prevTotal = total;

  const canvas = $('#canvas');
  if(fresh) canvas.querySelectorAll('.dynamic').forEach(e=>e.remove());
  if(q.type==='mc') renderMC(canvas,res);
  else if(q.type==='words') renderWords(canvas,res);
  else if(q.type==='text') renderText(canvas,res);
  else if(q.type==='rating') renderRating(canvas,res);
}

function ensure(canvas, cls){ let el = canvas.querySelector('.'+cls); if(!el){ el=document.createElement('div'); el.className=cls+' dynamic'; canvas.appendChild(el); } return el; }

// Multiple choice — build bars once, then update widths/labels in place (no re-render blink).
function renderMC(canvas,res){
  const box = ensure(canvas,'mc-box');
  const total = res.total||0;
  const max = Math.max(1,...res.options.map(o=>o.count));
  const topCount = Math.max(0,...res.options.map(o=>o.count));
  const sig = res.options.map(o=>o.id).join(',');
  if(box._sig !== sig){
    box._sig = sig;
    box.innerHTML = res.options.map((o,i)=>`
      <div class="bar-row" data-id="${o.id}">
        <div class="bar-top"><span class="label">${esc(o.text)}</span><span class="pct"></span></div>
        <div class="bar-track"><div class="bar-fill" style="background:linear-gradient(90deg,${pal(i)},${pal(i+1)})"></div></div>
      </div>`).join('');
  }
  res.options.forEach((o,i)=>{
    const row = box.querySelector('.bar-row[data-id="'+o.id+'"]'); if(!row) return;
    const pct = total ? Math.round(o.count/total*100) : 0;
    const win = total>0 && o.count===topCount && o.count>0;
    row.classList.toggle('winner', win);
    row.querySelector('.pct').textContent = pct+'% · '+o.count;
    const fill = row.querySelector('.bar-fill');
    fill.style.width = (o.count/max*100)+'%';
    fill.style.background = 'linear-gradient(90deg,'+(win?'#f5c45a':pal(i))+','+pal(i+1)+')';
  });
}

// Shrink a bubble's text until it fits inside the circle (no overflow).
function fitBubble(b, size){
  const inner = b.querySelector('.bw');
  if(!inner) return;
  const avail = size * 0.72;            // inscribed square of the circle
  inner.style.maxWidth = avail + 'px';
  let fs = Math.min(parseFloat(b.style.fontSize) || size*0.21, size*0.21);
  b.style.fontSize = fs + 'px';
  let guard = 0;
  while(inner.scrollHeight > avail && fs > 7 && guard++ < 80){
    fs -= 1; b.style.fontSize = fs + 'px';
  }
}

// Word cloud — keep existing bubbles in place; only pop in new words, grow existing.
function renderWords(canvas,res){
  const layer = ensure(canvas,'bubbles');
  if(!layer._pos){ layer._pos={}; layer._els={}; }
  const words = (res.words||[]).slice(0,40);
  const max = Math.max(1,...words.map(w=>w.count));
  const W = layer.clientWidth || canvas.clientWidth;
  const H = layer.clientHeight || canvas.clientHeight || 500;
  if(!words.length){ layer.innerHTML='<div class="idle"><div class="small">Waiting for the first answer…</div></div>'; layer._pos={}; layer._els={}; return; }
  if(layer.querySelector('.idle')){ layer.innerHTML=''; layer._pos={}; layer._els={}; }
  const placed = Object.values(layer._pos);
  const seen = new Set();
  words.forEach((w,i)=>{
    const key = w.text.toLowerCase(); seen.add(key);
    const lenBoost = Math.min(w.text.length, 140) * 1.5;   // longer answers get bigger bubbles (capped)
    const size = Math.min(Math.min(W,H)*0.62, 70 + (w.count/max)*Math.min(W,H)*0.28 + lenBoost);
    const fs = Math.max(14,size*0.21);
    const inner = `${esc(w.text)}${w.count>1?`<div style="font-size:.65em;opacity:.85">×${w.count}</div>`:''}`;
    let pos = layer._pos[key];
    if(!pos){
      let x,y,tries=0,ok=false;
      while(tries++<60){ x=Math.random()*(W-size); y=Math.random()*(H-size);
        ok=placed.every(p=>Math.hypot((x+size/2)-(p.x+p.s/2),(y+size/2)-(p.y+p.s/2))>(size+p.s)/2*0.9); if(ok)break; }
      pos={x,y,s:size}; layer._pos[key]=pos; placed.push(pos);
      const b=document.createElement('div'); b.className='bubble';
      b.style.cssText=`left:${x}px;top:${y}px;width:${size}px;height:${size}px;font-size:${fs}px;background:linear-gradient(135deg,${pal(i)},${pal(i+3)});animation:pop .55s cubic-bezier(.2,1.4,.4,1), floaty ${3+Math.random()*2}s ease-in-out ${Math.random()}s infinite;transition:width .5s,height .5s,font-size .5s;`;
      b.innerHTML=`<div class="bw">${inner}</div>`;
      layer._els[key]=b; layer.appendChild(b);
      fitBubble(b, size);
    } else {
      const b=layer._els[key];
      b.style.width=size+'px'; b.style.height=size+'px'; b.style.fontSize=fs+'px';
      b.querySelector('.bw').innerHTML=inner;
      fitBubble(b, size);
    }
  });
  Object.keys(layer._els).forEach(k=>{ if(!seen.has(k)){ layer._els[k].remove(); delete layer._els[k]; delete layer._pos[k]; } });
}

// Open text — only prepend NEW cards; existing cards stay untouched (no blink).
function renderText(canvas,res){
  const feed = ensure(canvas,'feed');
  if(!feed._seen) feed._seen = new Set();
  const entries = res.entries||[];                 // newest first
  if(!entries.length){ feed.innerHTML='<div class="small" style="color:var(--stage-muted)">Waiting for the first answer…</div>'; feed._seen=new Set(); return; }
  if(entries.length < feed._seen.size){ feed.innerHTML=''; feed._seen=new Set(); }   // responses cleared
  const ph = feed.querySelector('.small'); if(ph) ph.remove();
  const keyOf = e => e.ts+'|'+e.name+'|'+e.value;
  entries.filter(e=>!feed._seen.has(keyOf(e))).reverse().forEach(e=>{
    feed._seen.add(keyOf(e));
    const card=document.createElement('div'); card.className='feed-card';
    card.innerHTML=`<div class="who">💬 ${esc(e.name)}</div><div class="what">${esc(e.value)}</div>`;
    feed.insertBefore(card, feed.firstChild);
  });
}

// Rating — build once, then update numbers/bar heights in place.
function renderRating(canvas,res){
  const wrap = ensure(canvas,'rating-wrap');
  const max = res.max||5; const dist = res.distribution||{}; const avg = res.average||0;
  if(wrap._max !== max){
    wrap._max = max;
    let cols=''; for(let i=1;i<=max;i++) cols+=`<div class="dist-col"><div class="dist-num cnt" data-i="${i}">0</div><div class="dist-bar" data-i="${i}" style="height:5px"></div><div class="dist-num">${i}</div></div>`;
    wrap.innerHTML = `<div class="avg" id="rAvg">0</div><div class="stars" id="rStars" style="color:#f5c45a"></div><div class="avg-sub" id="rSub"></div><div class="dist">${cols}</div>`;
  }
  const maxCount = Math.max(1,...Object.values(dist));
  const full = Math.round(avg);
  let stars=''; for(let i=1;i<=max;i++) stars += i<=full ? '★' : '☆';
  wrap.querySelector('#rAvg').textContent = avg;
  wrap.querySelector('#rStars').textContent = stars;
  wrap.querySelector('#rSub').textContent = 'average of '+(res.total||0)+' rating'+(res.total===1?'':'s')+' · out of '+max;
  for(let i=1;i<=max;i++){
    const bar=wrap.querySelector('.dist-bar[data-i="'+i+'"]'); const cnt=wrap.querySelector('.cnt[data-i="'+i+'"]');
    if(bar) bar.style.height = ((dist[i]||0)/maxCount*100)+'%';
    if(cnt) cnt.textContent = dist[i]||0;
  }
}

/* ----- confetti (self-contained canvas) ----- */
const cc = $('#confetti'), ctx = cc.getContext('2d'); let parts=[];
function sizeCanvas(){ cc.width=innerWidth; cc.height=innerHeight; }
sizeCanvas(); addEventListener('resize',()=>{ sizeCanvas(); if(current) load(); });
function burstConfetti(n){
  const colors = document.body.classList.contains('bold') ? BOLD_PALETTE : ['#1a6dc4','#16a394','#f5c45a','#d4584b','#6b4cc0'];
  for(let i=0;i<n;i++) parts.push({ x:innerWidth/2+(Math.random()-.5)*300, y:innerHeight*0.35,
    vx:(Math.random()-.5)*9, vy:Math.random()*-9-3, g:0.28, r:Math.random()*7+4,
    c:colors[i%colors.length], rot:Math.random()*6, vr:(Math.random()-.5)*.4, life:0 });
  if(!rafOn){ rafOn=true; requestAnimationFrame(tick); }
}
let rafOn=false;
function tick(){
  ctx.clearRect(0,0,cc.width,cc.height);
  parts.forEach(p=>{ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life++;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.c; ctx.globalAlpha=Math.max(0,1-p.life/90);
    ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6); ctx.restore(); });
  parts = parts.filter(p=>p.life<90 && p.y<cc.height+40);
  if(parts.length) requestAnimationFrame(tick); else { rafOn=false; ctx.clearRect(0,0,cc.width,cc.height); }
}

/* ----- floating emoji reactions ----- */
function floatEmoji(em){
  const e=document.createElement('div'); e.className='float-emoji'; e.textContent=em;
  e.style.left=(Math.random()*86+7)+'%';
  e.style.fontSize=(36+Math.random()*28)+'px';
  e.style.animationDuration=(3.4+Math.random()*1.6)+'s';
  $('#emojiLayer').appendChild(e);
  setTimeout(()=>e.remove(),5200);
}

/* ----- sockets ----- */
const socket = io();
socket.on('results-changed', load);
socket.on('state-changed', load);
socket.on('reaction', d => { floatEmoji(d.emoji); });
load();
setInterval(load, 8000);
</script>
